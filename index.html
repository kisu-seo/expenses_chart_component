<!DOCTYPE html>
<html lang="ko">
<!--
  lang="ko" : 스크린 리더와 검색 엔진에 문서 언어를 선언.
  브라우저가 자동 번역 제안 여부를 결정하는 기준이기도 하다.
-->

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    viewport: 모바일 브라우저가 레이아웃 뷰포트를 디바이스 너비에 맞춰
    렌더링하도록 강제한다. 없으면 980px 기준으로 축소 렌더링되어
    모바일 디자인이 무력화된다.
  -->
  <meta name="description" content="지난 7일간의 지출 내역을 막대 차트로 시각화하는 컴포넌트입니다." />

  <title>Expenses Chart Component</title>

  <!--
    preconnect: 구글 폰트 서버와의 TCP/TLS 핸드셰이크를 미리 수행.
    폰트 파일 요청 시 연결 지연(RTT)을 줄여 LCP(최대 콘텐츠 렌더링) 성능에 기여한다.
    style-guide.md 명세에 따라 DM Sans 400(Regular) · 700(Bold) 두 가지 굵기를 로드.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!--
    ============================================================
    [앱 래퍼] .app
    - <main> : 페이지 안에서 반복되지 않는 핵심 콘텐츠의 컨테이너.
      랜드마크(Landmark) 역할로, 스크린 리더 사용자가 "주요 콘텐츠로 바로 이동"
      단축키로 이 영역에 바로 접근할 수 있다.
    - aria-label: <main>이 페이지에 하나뿐이라도 레이블을 부여하면
      스크린 리더의 랜드마크 목록에서 구체적인 역할이 드러난다.
    ============================================================
  -->
  <main class="app" aria-label="지출 차트 애플리케이션">

    <!--
      ============================================================
      [카드 1] 잔액 카드 (.balance-card) ─ START
      - <header> : 페이지 전체의 머리말(global header) 역할.
        이 컴포넌트에서는 "현재 잔액"이라는 대표 정보를 담아
        사용자가 차트를 보기 전 컨텍스트를 파악할 수 있게 한다.
      - aria-label: 스크린 리더가 이 <header> 영역으로 진입할 때
        "내 잔액 정보" 라고 읽어주어 콘텐츠의 목적을 즉시 전달한다.
      ============================================================
    -->
    <header class="balance-card" aria-label="내 잔액 정보">
      <div class="balance-card__info">
        <p class="balance-card__label">My balance</p>
        <p class="balance-card__amount">$921.48</p>
      </div>
      <!--
        aria-hidden="true" : 이 로고 이미지는 순수 장식용(decorative)이다.
        alt=""만으로도 스크린 리더가 건너뛰지만, aria-hidden을 명시해
        '의도적으로 숨긴 것'임을 코드 리뷰 시 명확히 드러낸다.
      -->
      <img class="balance-card__logo" src="images/logo.svg" alt="" aria-hidden="true" />
    </header>
    <!-- [카드 1] 잔액 카드 (.balance-card) ─ END -->

    <!--
      ============================================================
      [카드 2] 차트 카드 (.chart-card) ─ START
      - <section> : 독립적인 의미 단위(지출 차트)를 담는 시맨틱 컨테이너.
        aria-label로 레이블을 지정하면 스크린 리더의 랜드마크 탐색에서
        "지난 7일간 지출 차트 섹션"으로 노출된다.
      ============================================================
    -->
    <section class="chart-card" aria-label="지난 7일간 지출 차트">

      <!--
        <h1> : 이 컴포넌트의 핵심 주제를 나타내는 단 하나의 최상위 제목.
        페이지 내 h1이 하나여야 SEO와 문서 아웃라인 구조가 올바르게 유지된다.
      -->
      <h1 class="chart-card__title">Spending - Last 7 days</h1>

      <!--
        .chart : script.js의 renderChart()가 막대(.chart__bar-wrapper)를
        동적으로 주입(appendChild)할 대상 컨테이너.
        aria-label로 시각적으로 보이지 않는 컨텍스트를 스크린 리더에 전달하되,
        실제 접근성 정보(요일·금액)는 JS가 생성하는 각 막대의 aria-label에 위임한다.
      -->
      <div class="chart" aria-label="요일별 지출 막대 차트"></div>
      <!--
        ※ JS가 생성하는 막대 구조 (renderChart 참고):
          <div class="chart__bar-wrapper">
            <div class="chart__tooltip" aria-hidden="true">$52.36</div>
            <div class="chart__bar" role="img" aria-label="wed 지출: $52.36"></div>
            <span class="chart__day" aria-hidden="true">wed</span>
          </div>

        접근성 설계 근거:
        - 툴팁(.chart__tooltip)은 호버 시 시각적 보조 역할만 하므로 aria-hidden.
        - 요일 라벨(.chart__day)은 시각적 반복이므로 aria-hidden.
          (막대의 aria-label이 이미 "day 지출: $amount" 형식으로 요일+금액 정보를 제공)
        - 막대(.chart__bar)에만 role="img" + aria-label을 부여해
          스크린 리더가 요일별 지출을 중복 없이 한 번에 읽도록 설계.
      -->

      <!--
        aria-hidden="true" : <hr>는 시각적 구분선일 뿐, 스크린 리더에 의미 있는
        정보를 전달하지 않으므로 보조 기술의 읽기 대상에서 제외한다.
      -->
      <hr class="chart-card__divider" aria-hidden="true" />

      <!--
        .summary : 이번 달 총 지출 + 지난달 대비 증감률 영역.
        두 정보는 높이가 달라 align-items: flex-end로 아래 기준선을 맞춘다.
        (style.css .summary 참고)
      -->
      <div class="summary" aria-label="이번 달 지출 요약">

        <div class="summary__total">
          <p class="summary__label">Total this month</p>
          <p class="summary__amount">$478.33</p>
        </div>

        <!--
          aria-label: 이 <div>의 두 자식 요소("+ 2.4%", "from last month")가
          각각 읽힐 때 맥락이 불분명할 수 있으므로 그룹 레이블로 의미를 보조한다.
        -->
        <div class="summary__comparison" aria-label="지난달 대비 변화율">
          <p class="summary__percentage">+2.4%</p>
          <p class="summary__comparison-label">from last month</p>
        </div>

      </div>

    </section>
    <!-- [카드 2] 차트 카드 (.chart-card) ─ END -->

  </main>

  <!--
    <script>를 </body> 직전에 배치한 이유:
    브라우저는 HTML을 위에서 아래로 파싱하므로, script가 <head>에 있으면
    DOM 생성이 완료되기 전에 JS가 실행되어 .chart 요소를 찾지 못한다.
    </body> 직전 배치로 DOM 준비를 보장하며, defer 속성 없이도 동일 효과를 낸다.
  -->
  <script src="script.js"></script>
</body>

</html>
